version: '3.8'

services:
  web:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: khoma333/mz_store:v1.0
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - app_network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network

  celery:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: khoma333/mz_store:v1.0
    command: celery -A mz_store worker --loglevel=info --events
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - app_network

  flower:
    image: mher/flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery
    networks:
      - app_network                 

networks:
  app_network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:


